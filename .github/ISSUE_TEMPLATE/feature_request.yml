name: Feature Request
description: Suggest a new feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?

  - type: textarea
    id: prototype
    attributes:
      label: Prototype / Drawing
      description: Add a sketch, mockup, or description of how it should look (you can also paste images or links)
